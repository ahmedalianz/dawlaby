name: Deploy

# بيشتغل بس لما يتعمل merge على main
on:
  push:
    branches: ["main"]

jobs:
  # ─────────────────────────────────────────
  # Preview Build — بيبعت للـ testers
  # ─────────────────────────────────────────
  preview:
    name: Preview Build
    runs-on: ubuntu-latest
    environment: preview

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Setup EAS
        uses: expo/expo-github-action@v8
        with:
          eas-version: latest
          token: ${{ secrets.EXPO_TOKEN }}

      # بيعمل APK للـ Android وـ IPA للـ iOS
      - name: Build Preview
        run: eas build --profile preview --platform android --non-interactive

